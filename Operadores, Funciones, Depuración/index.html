<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplo de 7</title>
</head>

<body>


    <script>
        let numero = prompt("Dime un número");
        if (numero % 7 == 0) {
            alert("El número es múltiplo de 7");
        } else {
            alert("El número no es múltiplo de 7");
        }
    </script></s>
</body>
