<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validacion de Formularios</title>
</head>
<body>
    <h1>Formulario de envio</h1>
    <form action="procesa.php" onsubmit="return validaFormulario()">
        <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id = "nombre"> <br>
           
            
        <label for="edad">Edad:</label>
        <input type="text" name="edad" id = "edad"> <br>
         <input type="submit" value="Enviar Datos">
        
        


    </form>

    <script>
        function validaFormulario(){
            var nombre= document.getElementById("nombre");
            if(nombre.value.length == 0){
                alert("El nombre nombre no puede estar vacio");
                return false;
            }
            var edad= document.getElementById("edad");
            alert(edad.value);
            if(edad.value < 18) {
                alert("La edad no esta permitida al ser menor");
                return false;
            }
            alert("Datos correctos procedo a enviar");
            return true;
        }
    </script>
</body>
</html>
